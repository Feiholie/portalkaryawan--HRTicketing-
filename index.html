<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// CONFIG FIREBASE KAMU
const firebaseConfig = {
  apiKey: "AIzaSyCPBQQZSyWxfusvbkwUmWUWFkVTHz_5wnE",
  authDomain: "hrticketing-program.firebaseapp.com",
  projectId: "hrticketing-program",
  storageBucket: "hrticketing-program.firebasestorage.app",
  messagingSenderId: "701523833641",
  appId: "1:701523833641:web:884cba2ec7759a9ae07d38",
  measurementId: "G-Q67YZR56W5"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);
const auth = getAuth(app);

// LOGIN GOOGLE
window.login = async function() {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  localStorage.setItem("userEmail", result.user.email);
  alert("Login: " + result.user.email);
};

// AUTO CEK LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    localStorage.setItem("userEmail", user.email);
  }
});

// ===============================
// 🔥 OVERRIDE FUNCTION KAMU
// ===============================

// SIMPAN TIKET KE FIREBASE + LOCAL
const oldSubmit = window.submitTicket;

window.submitTicket = async function(e) {
  e.preventDefault();

  const id = `HR-${new Date().getFullYear()}-${Math.floor(1000 + Math.random() * 8999)}`;
  currentGeneratedId = id;

  const newTicket = {
    id,
    employeeName: document.getElementById('empName').value,
    division: document.getElementById('empDiv').value,
    category: document.getElementById('empCat').value,
    description: document.getElementById('empDesc').value,
    status: 'Pending',
    priority: 'Medium',
    date: new Date().toLocaleDateString('id-ID'),
    timestamp: Date.now(),
    email: localStorage.getItem("userEmail") || "guest"
  };

  // 🔥 SIMPAN KE FIREBASE
  try {
    await addDoc(collection(db, "tickets"), newTicket);
  } catch (err) {
    console.log("Firebase error:", err);
  }

  // 🔥 TETAP SIMPAN KE LOCAL (biar dashboard lama masih jalan)
  let tickets = JSON.parse(localStorage.getItem('hrflow_tickets')) || [];
  tickets.unshift(newTicket);
  localStorage.setItem('hrflow_tickets', JSON.stringify(tickets));

  // activity
  let activities = JSON.parse(localStorage.getItem('hrflow_activities')) || [];
  activities.unshift({ text: `Tiket baru ${id} dari ${newTicket.employeeName}`, time: new Date().toLocaleTimeString() });
  localStorage.setItem('hrflow_activities', JSON.stringify(activities.slice(0, 20)));

  document.getElementById('newTicketId').innerText = id;
  document.getElementById('successModal').classList.remove('hidden');
};


// TRACK DARI FIREBASE + LOCAL
const oldTrack = window.trackTicket;

window.trackTicket = async function(idToTrack = null) {
  const inputId = idToTrack || document.getElementById('trackInput').value.trim().toUpperCase();

  let ticket = null;

  // 🔥 AMBIL DARI FIREBASE
  try {
    const q = query(collection(db, "tickets"), where("id", "==", inputId));
    const snapshot = await getDocs(q);

    snapshot.forEach(doc => {
      ticket = doc.data();
    });
  } catch (err) {
    console.log("Firestore error:", err);
  }

  // fallback ke local
  if (!ticket) {
    const tickets = JSON.parse(localStorage.getItem('hrflow_tickets')) || [];
    ticket = tickets.find(t => t.id === inputId);
  }

  if(!ticket) {
    alert("ID Tiket tidak ditemukan.");
    return;
  }

  // 🔥 LANJUTKAN LOGIKA ASLI KAMU
  document.getElementById('trackEmpty').classList.add('hidden');
  document.getElementById('trackResult').classList.remove('hidden');
  
  document.getElementById('resName').innerText = ticket.employeeName;
  document.getElementById('resId').innerText = `ID: ${ticket.id}`;
  document.getElementById('resStatus').innerText = ticket.status;

  const stepIds = ['step-pending', 'step-progress', 'step-done'];
  const statusMap = { 'Pending': 0, 'On Progress': 1, 'Done': 2 };
  const activeIndex = statusMap[ticket.status];

  stepIds.forEach((sid, idx) => {
    const el = document.getElementById(sid);
    const dot = el.querySelector('div');
    const txt = el.querySelector('p');
    
    if(idx <= activeIndex) {
      el.classList.add('active');
      dot.classList.replace('bg-slate-200', 'bg-blue-600');
      txt.classList.replace('text-slate-400', 'text-blue-600');
      if(idx < activeIndex) dot.innerHTML = '<i data-lucide="check" size="10"></i>';
    } else {
      el.classList.remove('active');
      dot.classList.replace('bg-blue-600', 'bg-slate-200');
      txt.classList.replace('text-blue-600', 'text-slate-400');
      dot.innerHTML = idx + 1;
    }
  });

  const resNoteEl = document.getElementById('resNote');
  if (ticket.hrNote) {
    resNoteEl.innerText = ticket.hrNote;
  } else {
    const defaultNotes = {
      'Pending': 'Laporan Anda sudah masuk antrian dan menunggu verifikasi HR.',
      'On Progress': 'Tim HR sedang menindaklanjuti permintaan Anda.',
      'Done': 'Laporan selesai diproses.'
    };
    resNoteEl.innerText = defaultNotes[ticket.status];
  }

  lucide.createIcons();
};
</script>
